<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem}
#app{max-width:680px;margin:0 auto}
.card{background:#fff;border:0.5px solid #E0DDD6;border-radius:12px;padding:32px;display:flex;flex-direction:column;gap:16px}
.header{display:flex;align-items:center}
h1{flex:1;font-size:18px;font-weight:500;color:#1A1A1A}
.clear-btn{background:none;border:none;font-size:12px;color:#AAAAAA;cursor:pointer;padding:0;font-family:inherit}
.add-row{display:flex;gap:8px;align-items:center}
.add-input{flex:1;height:36px;padding:0 10px;font-size:14px;border:0.5px solid #CCC;border-radius:8px;background:#fff;color:#1A1A1A;outline:none;font-family:inherit}
.add-input:focus{border-color:#7F77DD}
.add-tag-pill{font-size:12px;padding:0 12px;height:36px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;cursor:pointer;border:0.5px solid #CCC;font-family:inherit}
.add-btn{height:36px;padding:0 15px;font-size:13px;border:0.5px solid #CCC;border-radius:8px;background:#fff;color:#1A1A1A;cursor:pointer;flex-shrink:0;font-family:inherit}
.add-btn:hover{background:#f5f5f3}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.f-btn{padding:4px 12px;font-size:12px;border-radius:20px;border:0.5px solid #DDD;background:transparent;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit}
.f-btn.active{background:#F0F0EE;color:#1A1A1A;border-color:#AAA}
.f-btn:hover{border-color:#AAA;color:#1A1A1A}
.f-del{background:none;border:none;color:#AAA;cursor:pointer;font-size:12px;line-height:1;padding:0;opacity:0}
.f-btn:hover .f-del{opacity:1}
.f-edit-wrap{display:inline-flex;align-items:center;border-radius:20px;border:0.5px solid #7F77DD;overflow:hidden;height:28px}
.f-edit-inp{width:80px;height:100%;padding:0 8px;font-size:12px;border:none;background:#fff;color:#1A1A1A;outline:none;font-family:inherit}
.f-edit-save{height:100%;padding:0 8px;font-size:11px;border:none;border-left:0.5px solid #DDD;background:transparent;color:#1A1A1A;cursor:pointer;font-family:inherit}
.add-cat-btn{padding:4px 10px;font-size:12px;border-radius:20px;border:0.5px dashed #CCC;background:transparent;color:#AAA;cursor:pointer;font-family:inherit}
.add-cat-btn:hover{color:#1A1A1A;border-color:#888}
.new-cat-wrap{display:inline-flex;align-items:center;border-radius:20px;border:0.5px solid #7F77DD;overflow:hidden;height:28px}
.new-cat-inp{width:90px;height:100%;padding:0 8px;font-size:12px;border:none;background:#fff;color:#1A1A1A;outline:none;font-family:inherit}
.new-cat-save{height:100%;padding:0 8px;font-size:11px;border:none;border-left:0.5px solid #DDD;background:transparent;color:#1A1A1A;cursor:pointer;font-family:inherit}
.hint{font-size:11px;color:#BBBBBB}
.task-list{display:flex;flex-direction:column;gap:6px}
.task{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:0.5px solid #E8E8E5;border-radius:8px;cursor:grab;user-select:none}
.task.drag-over{border:2px solid #7F77DD}
.task.done .task-text{text-decoration:line-through;color:#BBBBBB}
.drag-handle{color:#CCC;font-size:14px;cursor:grab;flex-shrink:0}
.check{width:16px;height:16px;border-radius:50%;border:1.5px solid #CCC;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.check.checked{background:#7F77DD;border-color:#7F77DD}
.check.checked::after{content:'';display:block;width:5px;height:8px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg) translateY(-1px)}
.task-text{flex:1;font-size:14px;color:#1A1A1A;min-width:0}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0}
.task-del{background:none;border:none;color:#CCC;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;flex-shrink:0;opacity:0;font-family:inherit}
.task:hover .task-del{opacity:1}
.edit-wrap{flex:1;display:flex;gap:8px;align-items:center;min-width:0}
.edit-inp{flex:1;min-width:0;height:28px;padding:0 8px;font-size:14px;border:0.5px solid #7F77DD;border-radius:8px;background:#fff;color:#1A1A1A;outline:none;font-family:inherit}
.cycle-pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap;flex-shrink:0;cursor:pointer;border:none;font-family:inherit}
.save-btn{flex-shrink:0;height:28px;padding:0 10px;font-size:12px;border:0.5px solid #CCC;border-radius:8px;background:transparent;color:#1A1A1A;cursor:pointer;font-family:inherit}
.save-btn:hover{background:#f5f5f3}
.empty{text-align:center;padding:2rem;font-size:13px;color:#BBBBBB;border:0.5px dashed #DDD;border-radius:8px}
</style>
</head>
<body>
<div id="app"><div class="card"></div></div>
<script>
const KEY='my-tasks-v2';
const PALETTE=[
  {bg:'#EEEDFE',color:'#3C3489'},{bg:'#E1F5EE',color:'#085041'},
  {bg:'#FAEEDA',color:'#633806'},{bg:'#F1EFE8',color:'#444441'},
  {bg:'#FAECE7',color:'#993C1D'},{bg:'#E6F1FB',color:'#0C447C'},
  {bg:'#EAF3DE',color:'#27500A'},{bg:'#FBEAF0',color:'#72243E'},
];

let tasks,cats,nextId,nextCatId,filter='all',editId=null,editTag=null,addTag,editCatId=null,addingCat=false,dragSrc=null;

function load(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY)||'null');
    if(d){tasks=d.tasks;cats=d.categories;nextId=d.nextId;nextCatId=d.nextCatId;}
  }catch(e){}
  if(!cats||!cats.length){
    cats=[
      {id:1,label:'Work',bg:'#EEEDFE',color:'#3C3489'},
      {id:2,label:'Personal',bg:'#E1F5EE',color:'#085041'},
      {id:3,label:'Side project',bg:'#FAEEDA',color:'#633806'},
      {id:4,label:'Other',bg:'#F1EFE8',color:'#444441'},
    ];nextCatId=5;
  }
  if(!tasks||!tasks.length){
    tasks=[{id:1,text:'Add your first task',tag:1,done:false}];nextId=2;
  }
  addTag=cats[0].id;
}

function save(){localStorage.setItem(KEY,JSON.stringify({tasks,categories:cats,nextId,nextCatId}));}
function catById(id){return cats.find(c=>c.id===id);}
function cycleTag(cur){const i=cats.findIndex(c=>c.id===cur);return cats[(i+1)%cats.length].id;}

function render(){
  const card=document.querySelector('.card');
  const shown=filter==='all'?tasks:tasks.filter(t=>t.tag===filter);
  const ac=catById(addTag);

  // filter bar html
  let fbHtml=`<button class="f-btn${filter==='all'?' active':''}" onclick="setFilter('all')">All</button>`;
  cats.forEach(c=>{
    if(editCatId===c.id){
      fbHtml+=`<span class="f-edit-wrap"><input class="f-edit-inp" id="eci" value="${c.label}" onkeydown="if(event.key==='Enter')saveCat(${c.id});if(event.key==='Escape')cancelCat()"><button class="f-edit-save" onclick="saveCat(${c.id})">Save</button></span>`;
    } else {
      fbHtml+=`<button class="f-btn${filter===c.id?' active':''}" onclick="setFilter(${c.id})" ondblclick="startEditCat(${c.id},event)">${c.label}<span class="f-del" onclick="delCat(${c.id},event)">×</span></button>`;
    }
  });
  fbHtml+=addingCat
    ?`<span class="new-cat-wrap"><input class="new-cat-inp" id="nci" placeholder="Category..." onkeydown="if(event.key==='Enter')saveNewCat();if(event.key==='Escape')cancelNewCat()"><button class="new-cat-save" onclick="saveNewCat()">Add</button></span>`
    :`<button class="add-cat-btn" onclick="startAddCat()">+ category</button>`;

  // task rows html
  let tHtml='';
  if(!shown.length){
    tHtml='<div class="empty">No tasks here — add one above</div>';
  } else {
    shown.forEach(t=>{
      if(editId===t.id){
        const ec=catById(editTag)||cats[0];
        tHtml+=`<div class="task" data-id="${t.id}">
          <span class="drag-handle" style="opacity:.3">⠿</span>
          <div class="edit-wrap">
            <input class="edit-inp" id="ei" value="${t.text.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveEdit();if(event.key==='Escape')cancelEdit()">
            <button class="cycle-pill" style="background:${ec.bg};color:${ec.color}" onclick="editTag=cycleTag(editTag);render()">${ec.label} ↻</button>
            <button class="save-btn" onclick="saveEdit()">Save</button>
          </div>
          <button class="task-del" style="opacity:1;color:#AAA" onclick="delTask(${t.id})">×</button>
        </div>`;
      } else {
        const tc=catById(t.tag);
        tHtml+=`<div class="task${t.done?' done':''}" draggable="true" data-id="${t.id}"
          ondragstart="dragSrc=event.currentTarget.dataset.id|0"
          ondragover="event.preventDefault();document.querySelectorAll('.task').forEach(el=>el.classList.remove('drag-over'));event.currentTarget.classList.add('drag-over')"
          ondragleave="event.currentTarget.classList.remove('drag-over')"
          ondrop="dropTask(${t.id})"
          ondragend="document.querySelectorAll('.task').forEach(el=>el.classList.remove('drag-over'))"
          ondblclick="startEdit(${t.id})">
          <span class="drag-handle">⠿</span>
          <div class="check${t.done?' checked':''}" onclick="toggleTask(${t.id})"></div>
          <span class="task-text">${t.text}</span>
          ${tc?`<span class="tag" style="background:${tc.bg};color:${tc.color}">${tc.label}</span>`:''}
          <button class="task-del" onclick="delTask(${t.id})">×</button>
        </div>`;
      }
    });
  }

  card.innerHTML=`
    <div class="header"><h1>My tasks</h1><button class="clear-btn" onclick="clearDone()">Clear completed</button></div>
    <div class="add-row">
      <input class="add-input" id="ai" placeholder="Add a task..." value="" onkeydown="if(event.key==='Enter')addTask()">
      ${ac?`<button class="add-tag-pill" style="background:${ac.bg};color:${ac.color}" onclick="addTag=cycleTag(addTag);render()">${ac.label}</button>`:''}
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <div class="filters">${fbHtml}</div>
    <p class="hint">Double-click a task to edit · Double-click a category to rename it</p>
    <div class="task-list">${tHtml}</div>
  `;

  // restore focus
  if(editCatId!==null){const el=document.getElementById('eci');if(el){el.focus();el.select();}}
  if(addingCat){const el=document.getElementById('nci');if(el)el.focus();}
  if(editId!==null){const el=document.getElementById('ei');if(el){el.focus();el.select();}}
}

function addTask(){
  const el=document.getElementById('ai');
  const text=el?el.value.trim():'';
  if(!text||!addTag)return;
  tasks.push({id:nextId++,text,tag:addTag,done:false});
  save();render();
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();render();}}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);if(editId===id)editId=null;save();render();}
function clearDone(){tasks=tasks.filter(t=>!t.done);save();render();}
function setFilter(v){filter=v;render();}

function startEdit(id){const t=tasks.find(t=>t.id===id);editId=id;editTag=t?t.tag:cats[0].id;render();}
function cancelEdit(){editId=null;editTag=null;render();}
function saveEdit(){
  const el=document.getElementById('ei');
  const t=tasks.find(t=>t.id===editId);
  if(t&&el){const txt=el.value.trim();if(txt)t.text=txt;t.tag=editTag;}
  editId=null;editTag=null;save();render();
}

function startEditCat(id,e){e.stopPropagation();editCatId=id;render();}
function cancelCat(){editCatId=null;render();}
function saveCat(id){
  const el=document.getElementById('eci');
  const c=catById(id);
  if(c&&el){const v=el.value.trim();if(v)c.label=v;}
  editCatId=null;save();render();
}
function delCat(id,e){
  e.stopPropagation();
  cats=cats.filter(c=>c.id!==id);
  tasks.forEach(t=>{if(t.tag===id)t.tag=cats[0]?cats[0].id:null;});
  if(filter===id)filter='all';
  if(addTag===id)addTag=cats[0]?cats[0].id:null;
  save();render();
}
function startAddCat(){addingCat=true;render();}
function cancelNewCat(){addingCat=false;render();}
function saveNewCat(){
  const el=document.getElementById('nci');
  if(!el)return;
  const v=el.value.trim();
  if(v){const pal=PALETTE[cats.length%PALETTE.length];cats.push({id:nextCatId++,label:v,bg:pal.bg,color:pal.color});}
  addingCat=false;save();render();
}

function dropTask(tgtId){
  if(!dragSrc||dragSrc===tgtId)return;
  const si=tasks.findIndex(t=>t.id===dragSrc),ti=tasks.findIndex(t=>t.id===tgtId);
  if(si<0||ti<0)return;
  const[m]=tasks.splice(si,1);tasks.splice(ti,0,m);
  dragSrc=null;save();render();
}

load();render();
</script>
</body>
</html>
